name: Run Unit Tests

on:
  workflow_call:
    inputs:
      test_plan:
        description: Test plan name to run.
        required: false
        type: string
        default: AllUnitTests
      run_ui_tests:
        description: Whether to run the UI test plan after unit tests.
        required: false
        type: boolean
        default: false
      ui_test_plan:
        description: UI test plan name to run.
        required: false
        type: string
        default: AllUITests

jobs:
  tests:
    # Pinned image + Xcode so the toolchain is frozen and the matching iOS
    # simulator runtime is guaranteed preinstalled. The macos-latest alias moved
    # to an image where Xcode 26.1.1's iOS 26.1 runtime is not installed; Xcode
    # 26.2 ships with iOS 26.2 preinstalled on macos-26.
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Xcode version
        run: xcodebuild -version

      - name: Resolve simulator
        id: simulator
        run: |
          set -euo pipefail
          # Prefer the runtime matching the selected Xcode's iOS SDK so the
          # destination is always compatible with the toolchain; fall back to
          # the newest available runtime if no exact match is present.
          SDK_VERSION=$(xcrun --sdk iphonesimulator --show-sdk-version)
          RUNTIME_JSON=$(xcrun simctl list runtimes available --json | jq -c --arg v "$SDK_VERSION" '
            [.runtimes[] | select(.name | startswith("iOS"))] as $ios
            | (($ios | map(select(.version == $v)) | first) // ($ios | sort_by(.version) | last))
          ')
          RUNTIME_ID=$(echo "$RUNTIME_JSON" | jq -r '.identifier')
          DEVICE_TYPE_ID=$(echo "$RUNTIME_JSON" | jq -r '
            ((.supportedDeviceTypes | map(select(.name == "iPhone 17 Pro")) | first) //
             (.supportedDeviceTypes | map(select(.name | test("^iPhone"))) | first))
            .identifier
          ')
          UDID=$(xcrun simctl list devices available --json | jq -r --arg rid "$RUNTIME_ID" '.devices[$rid][]? | select(.isAvailable==true) | .udid' | head -n 1)
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl create "CI Simulator" "$DEVICE_TYPE_ID" "$RUNTIME_ID")
          fi
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: xcodebuild -scheme "Spread Localhost" -testPlan "${{ inputs.test_plan }}" -destination "id=${{ steps.simulator.outputs.udid }}" test

      - name: Run UI tests
        if: ${{ inputs.run_ui_tests }}
        run: xcodebuild -scheme "Spread Localhost" -testPlan "${{ inputs.ui_test_plan }}" -destination "id=${{ steps.simulator.outputs.udid }}" test
