name: Run Unit Tests

on:
  workflow_call:
    inputs:
      test_plan:
        description: Test plan name to run.
        required: false
        type: string
        default: AllUnitTests
      run_ui_tests:
        description: Whether to run the UI test plan after unit tests.
        required: false
        type: boolean
        default: false
      ui_test_plan:
        description: UI test plan name to run.
        required: false
        type: string
        default: AllUITests

jobs:
  tests:
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.1.1
        run: sudo xcode-select -s /Applications/Xcode_26.1.1.app

      - name: Xcode version
        run: xcodebuild -version

      - name: Run unit tests
        run: xcodebuild -scheme "Spread Localhost" -testPlan "${{ inputs.test_plan }}" -destination "platform=iOS Simulator,name=iPhone 17 Pro" test

      - name: Run UI tests
        if: ${{ inputs.run_ui_tests }}
        run: xcodebuild -scheme "Spread Localhost" -testPlan "${{ inputs.ui_test_plan }}" -destination "platform=iOS Simulator,name=iPhone 17 Pro" test
